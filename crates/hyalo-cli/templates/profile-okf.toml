# --- OKF profile (added by `hyalo init --profile okf`) ---
# Open Knowledge Format: a vendor-neutral bundle of markdown "concept" notes.
# See https://github.com/ractive/hyalo (OKF section) for the concept model.

# Bundle-absolute links (`/tables/x.md`, the spec-recommended §5 form) resolve
# from the bundle root: `""` strips only the leading `/`, avoiding the
# auto-derived-prefix collision when a subdir shares the bundle dir name.
site_prefix = ""

# Keep authoring conformant: validate frontmatter against the schema on write.
validate_on_write = true

# Mark this vault as OKF-flavoured so plain `hyalo lint` runs the OKF §9
# conformance rules (advisory citation / reserved-file / augmentation checks)
# without needing `--profile okf` on every invocation. `hyalo lint --profile
# okf` on such a vault is then a no-op overlay (idempotent).
[lint]
profiles = ["okf"]

[schema]
# Reserved OKF files carry no `type`, so exempt them from the required-`type`
# check. `index.md` (bundle/section index) and `log.md` (changelog) are reserved.
exempt = ["**/index.md", "**/log.md"]

[schema.default]
# OKF concepts are identified by their `type`.
required = ["type"]

# Recommended OKF properties (declared as optional so authoring is not blocked,
# but type-checked when present).
[schema.default.properties.title]
type = "string"

[schema.default.properties.description]
type = "string"

[schema.default.properties.resource]
type = "string"
pattern = "^\\w[\\w+.-]*://"

[schema.default.properties.tags]
type = "list"

[schema.default.properties.timestamp]
type = "datetime-tz"

# OKF is vendor-neutral: the profile ships no example concept types, because a
# real vault's `type` values are domain-specific (a data catalog, a research
# library, an API reference all differ). Declare your own types under
# `[schema.types.<name>]` so authoring nudges match your domain. Quoted keys
# (spaces) are supported end-to-end, and `required_sections` steers authors
# toward the OKF-recommended body structure, e.g.:
#
#   [schema.types."Data Table"]
#   required = ["type", "title"]
#   required_sections = ["# Schema", "# Citations"]
#
# See the bundled `okf` skill ("Adding domain types") for the full recipe.
