name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          TAG_VERSION="${TAG#v}"
          echo "Git tag version:   $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "ERROR: tag '$TAG' does not match Cargo.toml version '$CARGO_VERSION'"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install security tools
        run: cargo install cargo-audit cargo-deny --locked

      - name: Audit dependencies for known vulnerabilities
        run: cargo audit

      - name: Check licenses, advisories, bans, and sources
        run: cargo deny check

  build:
    needs: [version-check, security]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cross

      - name: Build release
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Run tests
        run: ${{ matrix.cross && 'cross' || 'cargo' }} test --workspace --target ${{ matrix.target }}

      - name: Verify CLI runs
        if: "!matrix.cross"
        run: cargo run --release --target ${{ matrix.target }} -- --help

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../hyalo-${{ matrix.target }}.tar.gz hyalo
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../hyalo-${{ matrix.target }}.zip hyalo.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hyalo-${{ matrix.target }}
          path: hyalo-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" artifacts/*

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download SHA256SUMS from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "SHA256SUMS" --dir .

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "ERROR: HOMEBREW_TAP_TOKEN secret is not set"
            exit 1
          fi

          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          get_sha() {
            awk -v file="$1" '$2 == file {print $1}' SHA256SUMS
          }

          SHA_MACOS_ARM64=$(get_sha "hyalo-aarch64-apple-darwin.tar.gz")
          SHA_LINUX_ARM64=$(get_sha "hyalo-aarch64-unknown-linux-gnu.tar.gz")
          SHA_LINUX_X86=$(get_sha "hyalo-x86_64-unknown-linux-gnu.tar.gz")

          for var in SHA_MACOS_ARM64 SHA_LINUX_ARM64 SHA_LINUX_X86; do
            if [ -z "${!var}" ]; then
              echo "ERROR: missing SHA256 checksum for $var"
              exit 1
            fi
          done

          cat > formula.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          # Homebrew formula for hyalo — a CLI for exploring and managing Markdown knowledge bases.
          # Auto-updated by the release workflow in ractive/hyalo.
          class Hyalo < Formula
            desc "CLI for exploring and managing Markdown knowledge bases"
            homepage "https://github.com/ractive/hyalo"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/ractive/hyalo/releases/download/v#{version}/hyalo-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/ractive/hyalo/releases/download/v#{version}/hyalo-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end

              on_intel do
                url "https://github.com/ractive/hyalo/releases/download/v#{version}/hyalo-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "hyalo"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/hyalo --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' formula.rb

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ractive/homebrew-tap.git" tap
          cp formula.rb tap/Formula/hyalo.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hyalo.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged, skipping commit"
          else
            git commit -m "Update hyalo to ${VERSION}"
            git push
          fi
