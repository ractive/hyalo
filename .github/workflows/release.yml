name: Release

on:
  release:
    types: [published]
  workflow_dispatch: # dry run - builds + packages everything, publishes nothing

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: ractive/release-workflows/.github/workflows/release.yml@v0.2.0
    secrets: inherit
    with:
      bin-name: hyalo
      version-package: hyalo-cli
      publish-crates: hyalo-core,hyalo-mdlint,hyalo-cli
      winget-identifier: ractive.hyalo
      enable-linux-packages: true
      linux-package-crate: hyalo-cli
      # Publishes the .deb/.rpm to the hosted apt/yum repos at Cloudsmith
      # (non-blocking; needs the CLOUDSMITH_API_KEY repo secret):
      cloudsmith-repo: ractive/hyalo
      # Publishes a -bin PKGBUILD to the AUR (non-blocking; needs the
      # AUR_SSH_PRIVATE_KEY repo secret):
      aur-package: hyalo-bin
      # Ship shell completions in archives and deb/rpm. Copies into
      # crates/hyalo-cli/ because cargo-deb/cargo-generate-rpm resolve
      # asset paths relative to the crate directory.
      pre-package-command: |
        mkdir -p completions
        if [ "$CROSS" = "true" ] || [ "$TARGET" = "aarch64-pc-windows-msvc" ]; then
          # Target binary is not host-runnable: generate with a host build.
          cargo run --release -p hyalo-cli --bin hyalo -- completions bash > completions/hyalo.bash
          cargo run --release -p hyalo-cli --bin hyalo -- completions zsh  > completions/_hyalo
          cargo run --release -p hyalo-cli --bin hyalo -- completions fish > completions/hyalo.fish
        else
          "$BIN_PATH" completions bash > completions/hyalo.bash
          "$BIN_PATH" completions zsh  > completions/_hyalo
          "$BIN_PATH" completions fish > completions/hyalo.fish
        fi
        mkdir -p crates/hyalo-cli/completions
        cp completions/* crates/hyalo-cli/completions/
      extra-archive-paths: completions
      dry-run: ${{ github.event_name == 'workflow_dispatch' }}
