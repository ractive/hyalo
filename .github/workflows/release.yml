name: Release

on:
  release:
    types: [published]
  workflow_dispatch: # dry run - builds + packages everything, publishes nothing

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: ractive/release-workflows/.github/workflows/release.yml@v0.1.2
    secrets: inherit
    with:
      bin-name: hyalo
      version-package: hyalo-cli
      publish-crates: hyalo-core,hyalo-mdlint,hyalo-cli
      winget-identifier: ractive.hyalo
      dry-run: ${{ github.event_name == 'workflow_dispatch' }}
